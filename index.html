<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>운영 일정 캘린더</title>
    <link rel="stylesheet" href="./styles.css?v=20260630-2234" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="period">2026.07 - 2027.06</p>
        <h1>운영 일정 캘린더</h1>
      </div>
      <nav class="tabs" aria-label="페이지">
        <button type="button" class="tab-button is-active" data-tab="dashboard">대시보드</button>
        <button type="button" class="tab-button" data-tab="organizations">기관 리스트</button>
        <button type="button" class="tab-button" data-tab="archive">이전 운영</button>
      </nav>
    </header>

    <main>
      <section class="tab-panel is-active" id="dashboardPanel" data-panel="dashboard">
        <section class="calendar-view" id="calendarView" aria-labelledby="calendarTitle">
          <div class="month-toolbar">
            <button type="button" class="month-nav-button" id="prevMonthBtn" aria-label="이전 달">‹</button>
            <div>
              <p class="eyebrow">대시보드</p>
              <h2 id="calendarTitle">2026년 7월</h2>
              <p class="month-owner" id="monthOwner">담당: 태연</p>
            </div>
            <button type="button" class="month-nav-button" id="nextMonthBtn" aria-label="다음 달">›</button>
          </div>

          <div class="calendar-shell" id="calendarShell">
            <div class="calendar-grid" id="calendarGrid"></div>
          </div>

          <div class="month-list">
            <div class="section-heading">
              <h3>이 달의 일정</h3>
              <span id="monthEventCount">0건</span>
            </div>
            <div id="monthEvents" class="month-events"></div>
          </div>
        </section>

        <section class="date-detail" id="dateDetailView" hidden>
          <button type="button" class="back-button" id="backToCalendarBtn">캘린더로 돌아가기</button>
          <div class="detail-layout">
            <aside class="detail-summary">
              <p class="eyebrow">선택 날짜</p>
              <h2 id="selectedDateTitle">2026년 7월 1일</h2>
              <div id="selectedDateMeta" class="meta-list"></div>
            </aside>

            <section class="detail-content">
              <div id="emptyState" class="empty-state">
                <h3>등록된 일정이 없습니다</h3>
                <p>이 날짜에 진행할 일정을 등록하세요.</p>
                <button type="button" id="createEventBtn">등록하기</button>
              </div>

              <article id="eventView" class="event-view" hidden>
                <div class="event-view-head">
                  <div>
                    <p class="eyebrow">일정 보기</p>
                    <h3 id="eventViewTitle">일정</h3>
                  </div>
                  <span class="status-pill" id="eventViewStatus">준비중</span>
                </div>
                <dl class="event-fields" id="eventViewFields"></dl>
                <div class="notice-box">
                  <div class="section-heading">
                    <h3>공지문</h3>
                    <button type="button" id="copyNoticeBtn">공지 복사</button>
                  </div>
                  <textarea id="noticePreview" readonly rows="12"></textarea>
                </div>
                <div class="detail-actions">
                  <button type="button" id="editEventBtn">수정</button>
                  <button type="button" class="danger" id="deleteEventBtn">삭제</button>
                </div>
              </article>

              <form id="eventForm" class="event-form" hidden>
                <div class="section-heading">
                  <h3 id="eventFormTitle">일정 등록</h3>
                  <button type="button" id="cancelEventFormBtn">취소</button>
                </div>
                <fieldset>
                  <legend>기본 정보</legend>
                  <label>
                    날짜
                    <input name="date" type="date" min="2026-07-01" max="2027-06-30" required />
                  </label>
                  <label>
                    구분
                    <select name="category">
                      <option value="봉사">봉사</option>
                      <option value="액티비티">액티비티</option>
                      <option value="행사">행사</option>
                    </select>
                  </label>
                  <label>
                    담당
                    <input name="owner" type="text" required />
                  </label>
                  <label>
                    일정명
                    <input name="title" type="text" placeholder="예: 따스한채움터 급식봉사 / 볼링 / 송년회" required />
                  </label>
                  <label>
                    상태
                    <select name="status">
                      <option value="준비중">준비중</option>
                      <option value="모집중">모집중</option>
                      <option value="확정">확정</option>
                      <option value="완료">완료</option>
                    </select>
                  </label>
                  <label>
                    시작 시간
                    <input name="startTime" type="time" />
                  </label>
                  <label>
                    종료 시간
                    <input name="endTime" type="time" />
                  </label>
                  <label class="wide">
                    장소
                    <input name="place" type="text" placeholder="주소, 집결 위치, 주차 여부" />
                  </label>
                  <label class="wide">
                    일정 소개
                    <textarea name="intro" rows="3" placeholder="공지문 첫 문단에 들어갈 설명"></textarea>
                  </label>
                </fieldset>

                <fieldset>
                  <legend>공지 정보</legend>
                  <label>
                    복장
                    <input name="dressCode" type="text" placeholder="편한 복장, 양말" />
                  </label>
                  <label>
                    인원
                    <input name="capacity" type="text" placeholder="10명 (이후 대기)" />
                  </label>
                  <label>
                    정회원 참가비
                    <input name="memberFee" type="text" placeholder="0원 또는 4만원" />
                  </label>
                  <label>
                    준회원 참가비
                    <input name="associateFee" type="text" placeholder="정회원 + 1만원" readonly />
                  </label>
                  <label class="wide">
                    입금 계좌
                    <input name="bankAccount" type="text" placeholder="은행명 계좌번호 예금주" />
                  </label>
                  <label class="wide">
                    세부 일정
                    <textarea name="detailSchedule" rows="5" placeholder="10:30 - 11:00 - OT, 역할분담 및 준비&#10;11:00 - 12:30 - 역할에 따른 배식, 서빙, 설거지 등 진행"></textarea>
                  </label>
                  <label class="wide">
                    메모
                    <textarea name="memo" rows="3" placeholder="운영진 메모"></textarea>
                  </label>
                </fieldset>

                <div class="detail-actions">
                  <button type="submit" class="primary">저장</button>
                </div>
              </form>
            </section>
          </div>
        </section>
      </section>

      <section class="tab-panel" id="organizationsPanel" data-panel="organizations" hidden>
        <div class="section-heading page-heading">
          <div>
            <p class="eyebrow">기관 관리</p>
            <h2>기관 리스트</h2>
          </div>
          <button type="button" id="addOrganizationBtn">기관 등록</button>
        </div>
        <div class="organization-layout">
          <div id="organizationList" class="organization-list"></div>
          <form id="organizationForm" class="organization-form" hidden>
            <div class="section-heading">
              <h3 id="organizationFormTitle">기관 등록</h3>
              <button type="button" id="cancelOrganizationBtn">취소</button>
            </div>
            <label>
              기관명
              <input name="name" type="text" required />
            </label>
            <label>
              주소
              <input name="address" type="text" />
            </label>
            <label>
              집결/주차
              <input name="meeting" type="text" />
            </label>
            <label>
              기본 복장
              <input name="dressCode" type="text" />
            </label>
            <label>
              메모
              <textarea name="memo" rows="4"></textarea>
            </label>
            <button type="submit" class="primary">저장</button>
          </form>
        </div>
      </section>

      <section class="tab-panel" id="archivePanel" data-panel="archive" hidden>
        <div class="page-heading">
          <p class="eyebrow">지난 기록</p>
          <h2>이전 운영</h2>
        </div>
        <div id="archiveList" class="archive-list"></div>
      </section>
    </main>

    <script src="./app.js?v=20260630-2234"></script>
  </body>
</html>
